<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestion des Auteurs</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>
<h1>Gestion des Auteurs</h1>
<hr/>

<form action="/auteurs/ajouter" method="post">
    <label>Nom et prénom :</label>
    <input type="text" name="nom" required/>
    <button type="submit" class="btn-ajouter">Ajouter</button>
</form>

<hr/>

<h2>Liste des Auteurs</h2>
<table>
    <tr>
        <th>ID</th>
        <th>Nom et Prénom</th>
        <th>NbrePoints</th>
    </tr>
    <tr th:each="auteur : ${auteurs}">
        <td th:text="${auteur.id}"></td>
        <td th:text="${auteur.nom + ' ' + auteur.prenom}"></td>
        <td th:text="${auteur.points}"></td>
    </tr>
</table>

<hr/>
<a href="/" class="retour">← Retour au Menu</a>
</body>
</html>
